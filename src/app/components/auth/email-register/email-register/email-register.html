<div class="auth-container">
  <div class="auth-card">
    <!-- Header -->
    <div class="auth-header">
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Join PrimRose and start your adventure</p>
    </div>

    <!-- Register: Name + Email + Password -->
    <div class="auth-form-wrapper">
      <form #registerForm="ngForm" (ngSubmit)="submitRegister()" class="auth-form">
        

        

        <!-- Email Field -->
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input
            type="email"
            class="form-control form-control-lg"
            id="email"
            name="email"
            placeholder="john@example.com"
            [(ngModel)]="email"
            required
            email
            #emailField="ngModel"
            [class.is-invalid]="isSubmitted && emailField.invalid"
          />
          <div class="invalid-feedback d-block" *ngIf="isSubmitted && emailField.invalid">
            <span *ngIf="emailField.errors?.['required']">Email is required</span>
            <span *ngIf="emailField.errors?.['email']">Please enter a valid email address</span>
          </div>
        </div>

        
        <!-- Submit Button -->
        <button type="submit"  class="btn btn-primary btn-lg w-100 auth-submit-btn">
          Request OTP
        </button>

        <!-- Sign In Link -->
        <p class="auth-footer-text text-dark">
          Already have an account? <a [routerLink]="['/auth']" class="text-primary fw-bold">Sign in</a>
        </p>
      </form>
    </div>
  </div>

  <!-- Background decoration -->
  <div class="auth-decoration"></div>
</div>
