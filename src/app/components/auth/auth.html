<div class="auth-container">
  <div class="auth-card">
    <!-- Header -->
    <div class="auth-header">
      <h2 class="auth-title">Welcome to PrimRose</h2>
      <p class="auth-subtitle">Sign in to continue your journey</p>
    </div>

    <!-- Login: Phone + Password -->
    <div class="auth-form-wrapper">
      <form #loginForm="ngForm" (ngSubmit)="submitLogin()" class="auth-form">
        <!-- Email Field -->
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input
            type="email"
            class="form-control form-control-lg"
            id="email"
            name="email"
            placeholder="john@example.com"
            [(ngModel)]="email"
            required
            email
            #emailField="ngModel"
            [class.is-invalid]="isSubmitted && emailField.invalid"
          />
          <div class="invalid-feedback d-block" *ngIf="isSubmitted && emailField.invalid">
            <span *ngIf="emailField.errors?.['required']">Email is required</span>
            <span *ngIf="emailField.errors?.['email']">Please enter a valid email address</span>
          </div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control form-control-lg"
            id="password"
            name="password"
            placeholder="Enter your password"
            [(ngModel)]="password"
            required
            minlength="6"
            #passField="ngModel"
            [class.is-invalid]="isSubmitted && passField.invalid"
          />
          <div class="invalid-feedback d-block" *ngIf="isSubmitted && passField.invalid">
            <span *ngIf="passField.errors?.['required']">Password is required</span>
            <span *ngIf="passField.errors?.['minlength']">Password must be at least 6 characters</span>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <a class="small text-primary" href="/forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100 auth-submit-btn">
          Sign In
        </button>

        <p class="auth-footer-text text-dark">
          New to PrimRose? <a [routerLink]="['/email-register']" class="text-primary fw-bold">Create an account</a>
        </p>
      </form>
    </div>
  </div>

  <!-- Background decoration -->
  <div class="auth-decoration"></div>
</div>
